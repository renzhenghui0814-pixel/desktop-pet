<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>桌面宠物 · 设置</title>
  <style>
    :root {
      --cream: #faf7f2;
      --warm-white: #fffcf8;
      --orange: #e87822;
      --orange-light: #f5a04a;
      --orange-glow: rgba(232,120,34,0.15);
      --brown: #4a3320;
      --brown-light: #6b5340;
      --gray: #b0a89c;
      --gray-light: #d9d2c7;
      --danger: #d44;
      --danger-soft: rgba(220,68,68,0.06);
      --shadow-sm: 0 1px 3px rgba(74,51,32,0.06);
      --shadow-md: 0 4px 16px rgba(74,51,32,0.08);
      --shadow-lg: 0 8px 32px rgba(74,51,32,0.12);
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 20px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Georgia,'Microsoft YaHei','PingFang SC',serif;
      background:var(--cream);
      height:100vh;
      display:flex;flex-direction:column;
      user-select:none;
      -webkit-font-smoothing:antialiased;
    }

    /* ─── 背景纹理 ─── */
    body::before {
      content:'';
      position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.03;
      background:
        radial-gradient(circle at 15% 20%, #e87822 1px, transparent 1px),
        radial-gradient(circle at 85% 30%, #e87822 1px, transparent 1px),
        radial-gradient(circle at 25% 60%, #e87822 1.5px, transparent 1.5px),
        radial-gradient(circle at 75% 70%, #e87822 1px, transparent 1px),
        radial-gradient(circle at 50% 85%, #e87822 1.5px, transparent 1.5px),
        radial-gradient(circle at 10% 90%, #e87822 1px, transparent 1px);
    }

    /* ─── 头部 ─── */
    .hdr{
      position:relative;z-index:1;
      display:flex;justify-content:space-between;align-items:center;
      padding:16px 20px;
      background:linear-gradient(135deg, var(--warm-white) 0%, #fef5ed 60%, var(--cream) 100%);
      cursor:move;
      overflow:hidden;
    }
    /* 猫耳装饰 */
    .hdr::before, .hdr::after {
      content:'';
      position:absolute;bottom:-4px;width:0;height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-bottom:10px solid var(--orange);
      opacity:0.18;
    }
    .hdr::before { left:52px; }
    .hdr::after  { left:70px; }
    .hdr-title{
      display:flex;align-items:center;gap:8px;
      font-size:16px;font-weight:700;color:var(--brown);
      letter-spacing:0.5px;
    }
    .hdr-title .pet-face { font-size:22px; line-height:1; }
    .hdr-close{
      width:32px;height:32px;display:flex;align-items:center;justify-content:center;
      font-size:18px;color:var(--gray);cursor:pointer;
      border:none;background:transparent;
      border-radius:50%;
      transition:all 0.2s;
    }
    .hdr-close:hover{ background:rgba(0,0,0,0.04); color:var(--brown); transform:rotate(90deg); }

    /* ─── 标签栏 ─── */
    .tabs{
      position:relative;z-index:1;
      display:flex;gap:4px;padding:6px 12px;
      background:var(--cream);
      border-bottom:1px solid rgba(0,0,0,0.04);
    }
    .tab{
      flex:1;text-align:center;
      padding:9px 0;font-size:12px;letter-spacing:0.3px;
      color:var(--gray);cursor:pointer;
      border-radius:var(--radius-sm);
      font-weight:500;
      transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position:relative;
    }
    .tab:hover{ color:var(--brown-light); background:rgba(255,255,255,0.5); }
    .tab.active{
      color:#fff;
      background:linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
      box-shadow:0 2px 8px var(--orange-glow);
      font-weight:600;
      animation: tabPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes tabPop {
      0% { transform:scale(0.92); }
      100% { transform:scale(1); }
    }

    /* ─── 内容区 ─── */
    .body{
      position:relative;z-index:1;
      flex:1;overflow-y:auto;padding:16px;
    }
    .page{
      display:none;
      animation:fadeSlideIn 0.3s ease;
    }
    .page.active{display:block}
    @keyframes fadeSlideIn {
      0% { opacity:0; transform:translateY(8px); }
      100% { opacity:1; transform:translateY(0); }
    }

    /* ─── 形象卡 ─── */
    .style-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .style-card{
      padding:20px 12px 16px;
      border:2px solid transparent;
      border-radius:var(--radius);
      text-align:center;cursor:pointer;
      background:var(--warm-white);
      box-shadow:var(--shadow-sm);
      transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .style-card:hover{
      border-color:rgba(232,120,34,0.2);
      box-shadow:var(--shadow-md);
      transform:translateY(-2px);
    }
    .style-card.active{
      border-color:var(--orange);
      background:linear-gradient(135deg, #fffcf8 0%, #fff5eb 100%);
      box-shadow:var(--shadow-md), 0 0 0 6px var(--orange-glow);
    }
    .style-icon{
      width:60px;height:60px;border-radius:50%;
      margin:0 auto 10px;
      background:var(--cream);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;
      transition:transform 0.3s;
    }
    .style-card:hover .style-icon{ transform:scale(1.08); }
    .style-card.active .style-icon{
      box-shadow:0 0 0 4px rgba(232,120,34,0.25);
      background:#fff;
    }
    .style-name{font-size:14px;color:var(--brown);font-weight:700;margin-bottom:2px}
    .style-card.active .style-name{color:var(--orange)}
    .style-desc{font-size:11px;color:var(--gray);letter-spacing:0.2px}
    .style-card.active .style-desc{color:var(--orange-light)}

    /* ─── 配色 ─── */
    .color-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .color-card{
      padding:18px 10px 14px;
      border:2px solid transparent;
      border-radius:var(--radius);
      text-align:center;cursor:pointer;
      background:var(--warm-white);
      box-shadow:var(--shadow-sm);
      transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .color-card:hover{
      box-shadow:var(--shadow-md);
      transform:translateY(-2px);
    }
    .color-card.active{
      border-color:var(--orange);
      box-shadow:var(--shadow-md), 0 0 0 6px var(--orange-glow);
    }
    .color-dot{
      width:36px;height:36px;border-radius:50%;
      margin:0 auto 8px;
      transition:transform 0.3s;
      position:relative;
    }
    .color-card.active .color-dot{
      transform:scale(1.12);
      box-shadow:0 3px 12px rgba(0,0,0,0.18);
    }
    .color-card.active .color-dot::after {
      content:'✓';
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:15px;font-weight:bold;
      text-shadow:0 1px 2px rgba(0,0,0,0.3);
    }
    .color-name{font-size:13px;color:var(--brown);font-weight:600}
    .color-card.active .color-name{color:var(--orange)}

    /* ─── 缩放 ─── */
    .scale-box{
      padding:24px 16px;
      background:var(--warm-white);
      border-radius:var(--radius);
      box-shadow:var(--shadow-sm);
      text-align:center;
    }
    .scale-label{
      display:flex;justify-content:space-between;align-items:baseline;
      margin-bottom:16px;
    }
    .scale-label span{font-size:14px;color:var(--brown-light)}
    .scale-label b{
      font-size:28px;color:var(--orange);font-weight:700;
      letter-spacing:-0.5px;
    }
    /* 自定义滑块 */
    input[type="range"]{
      -webkit-appearance:none;appearance:none;
      width:100%;height:8px;
      border-radius:4px;
      background:linear-gradient(90deg, #d4b896 0%, var(--orange) 100%);
      outline:none;cursor:pointer;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;appearance:none;
      width:28px;height:28px;
      border-radius:50%;
      background:#fff;
      border:3px solid var(--orange);
      box-shadow:var(--shadow-md);
      cursor:pointer;
      transition:transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover{ transform:scale(1.15); }
    input[type="range"]::-webkit-slider-thumb:active{ transform:scale(1.25); }

    /* ─── 列表项 ─── */
    .list{max-height:220px;overflow-y:auto;margin-bottom:12px}
    .list:empty::after{
      content:'暂无';
      display:block;text-align:center;
      padding:32px 0;color:var(--gray-light);font-size:13px;
      font-style:italic;
    }
    .item{
      display:flex;align-items:center;gap:8px;
      padding:8px 12px;margin-bottom:4px;
      background:var(--warm-white);
      border-radius:var(--radius-sm);
      font-size:13px;
      transition:all 0.15s;
    }
    .item:hover{ background:#fff; box-shadow:var(--shadow-sm); }
    .item span{flex:1;color:var(--brown);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item em{
      font-size:11px;color:var(--orange);min-width:44px;font-style:normal;
      font-weight:700;letter-spacing:0.5px;
      background:rgba(232,120,34,0.06);
      padding:2px 6px;border-radius:4px;text-align:center;
    }
    .btn{
      background:none;border:1px solid var(--gray-light);
      border-radius:6px;padding:3px 10px;font-size:11px;
      cursor:pointer;color:var(--gray);
      transition:all 0.15s;
    }
    .btn:hover{ border-color:var(--orange); color:var(--orange); background:rgba(232,120,34,0.04); }
    .btn.del:hover{ border-color:var(--danger); color:var(--danger); background:var(--danger-soft); }
    .add{display:flex;gap:8px}
    .add button{
      background:linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
      color:#fff;border:none;border-radius:var(--radius-sm);
      padding:8px 20px;font-size:18px;font-weight:700;cursor:pointer;
      box-shadow:0 2px 8px var(--orange-glow);
      transition:all 0.2s;
    }
    .add button:hover{ transform:scale(1.05); box-shadow:0 4px 16px rgba(232,120,34,0.25); }
    .add button:active{ transform:scale(0.96); }

    /* ─── 输入框 ─── */
    input[type="text"], input:not([type]) {
      flex:1;padding:10px 14px;
      border:2px solid var(--gray-light);
      border-radius:var(--radius-sm);
      font-size:13px;font-family:inherit;outline:none;
      background:var(--warm-white);
      color:var(--brown);
      transition:all 0.2s;
    }
    input[type="text"]:focus, input:not([type]):focus{
      border-color:var(--orange);
      box-shadow:0 0 0 4px var(--orange-glow);
      background:#fff;
    }
    input::placeholder{ color:var(--gray-light); font-style:italic; }

    /* ─── 时间选择器 ─── */
    .time-row{
      display:flex;align-items:center;justify-content:center;gap:6px;
      margin-bottom:12px;padding:16px;
      background:var(--warm-white);
      border-radius:var(--radius);
      box-shadow:var(--shadow-sm);
    }
    .time-row select{
      padding:10px 8px;
      border:2px solid var(--gray-light);
      border-radius:var(--radius-sm);
      font-size:22px;font-weight:700;font-family:inherit;
      outline:none;cursor:pointer;
      background:var(--warm-white);
      color:var(--brown);
      text-align:center;
      appearance:none;-webkit-appearance:none;
      transition:all 0.2s;
      min-width:60px;
    }
    .time-row select:hover{ border-color:var(--orange-light); }
    .time-row select:focus{
      border-color:var(--orange);
      box-shadow:0 0 0 4px var(--orange-glow);
    }
    .time-row .colon{
      font-size:28px;font-weight:300;color:var(--orange);
      margin:0 2px;
    }
    .reminder-add-row{display:flex;gap:8px}

    /* ─── 退出按钮 ─── */
    .quit-btn{
      width:100%;padding:14px;
      border:2px solid rgba(220,68,68,0.2);
      border-radius:var(--radius);
      background:var(--danger-soft);
      color:var(--danger);font-size:14px;font-weight:600;
      cursor:pointer;letter-spacing:0.5px;
      transition:all 0.25s;
      margin-top:8px;
    }
    .quit-btn:hover{
      background:rgba(220,68,68,0.12);
      border-color:rgba(220,68,68,0.35);
      box-shadow:0 4px 16px rgba(220,68,68,0.1);
    }

    /* 滚动条 */
    ::-webkit-scrollbar{ width:5px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:var(--gray-light); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover{ background:var(--gray); }
  </style>
</head>
<body>
<div class="hdr" id="dragHdr">
  <span class="hdr-title"><span class="pet-face">🐾</span>桌面宠物 · 设置</span>
  <button class="hdr-close" id="closeBtn">&times;</button>
</div>
<div class="tabs">
  <div class="tab active" data-tab="style">形象</div>
  <div class="tab" data-tab="color">主题</div>
  <div class="tab" data-tab="scale">缩放</div>
  <div class="tab" data-tab="phrases">宠语</div>
  <div class="tab" data-tab="reminders">提醒</div>
  <div class="tab" data-tab="quit">退出</div>
</div>
<div class="body">
  <div class="page active" id="page-style">
    <div class="style-grid">
      <div class="style-card active" data-style="realistic"><div class="style-icon">🐱</div><div class="style-name">写实猫</div><div class="style-desc">圆润可爱</div></div>
      <div class="style-card" data-style="robot"><div class="style-icon">🤖</div><div class="style-name">机器猫</div><div class="style-desc">未来伙伴</div></div>
      <div class="style-card" data-style="block"><div class="style-icon">🧱</div><div class="style-name">积木猫</div><div class="style-desc">方块世界</div></div>
      <div class="style-card" data-style="demon"><div class="style-icon">👿</div><div class="style-name">恶魔猫</div><div class="style-desc">暗黑龙猫</div></div>
    </div>
  </div>
  <div class="page" id="page-color">
    <div class="color-grid">
      <div class="color-card active" data-theme="orange"><div class="color-dot" style="background:linear-gradient(135deg, #e08a28, #f0b048)"></div><div class="color-name">橘色</div></div>
      <div class="color-card" data-theme="black"><div class="color-dot" style="background:linear-gradient(135deg, #3a3532, #5a5550)"></div><div class="color-name">黑色</div></div>
      <div class="color-card" data-theme="white"><div class="color-dot" style="background:linear-gradient(135deg, #f0ece6, #faf8f4)"></div><div class="color-name">白色</div></div>
    </div>
  </div>
  <div class="page" id="page-scale">
    <div class="scale-box">
      <div class="scale-label"><span>宠物大小</span><b id="scaleVal">100%</b></div>
      <input type="range" id="scaleSlider" min="40" max="160" value="100" />
    </div>
  </div>
  <div class="page" id="page-phrases">
    <div class="list" id="phraseList"></div>
    <div class="add"><input id="phraseInput" placeholder="输入一句新宠语..." /><button id="phraseAdd">+</button></div>
  </div>
  <div class="page" id="page-reminders">
    <div class="time-row">
      <select id="reminderHour"></select>
      <span class="colon">:</span>
      <select id="reminderMinute"></select>
    </div>
    <div class="reminder-add-row">
      <input id="reminderInput" placeholder="提醒内容，如：开会" />
      <button id="reminderAdd">+</button>
    </div>
    <div class="list" id="reminderList" style="margin-top:12px"></div>
  </div>
  <div class="page" id="page-quit">
    <button class="quit-btn" id="quitBtn">确认退出桌面宠物</button>
  </div>
</div>
<script src="settings.js"></script>
</body>
</html>
